# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# sys.path path, pathsep delimited, prepend to sys.path.
# Defaults to the current working directory.
prepend_syspath = .

# version location specification; this defaults to alembic/versions.
version_locations = %(here)s/alembic/versions

# version path separator; defaults to ';'
version_path_separator = ;

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
